name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_ORIGIN: https://ashok314.github.io
      PAGES_ROOT: /homepage
      ROOT_APP: home
      DEPLOY_APPS: "binita helloworld"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and assemble Pages artifact
        run: |
          set -eu
          mkdir -p dist

          root_base_path="${PAGES_ROOT}/"
          root_site_url="${SITE_ORIGIN}${root_base_path}"

          echo "Building ${ROOT_APP} -> ${root_base_path}"
          PUBLIC_BASE_PATH="$root_base_path" \
          PUBLIC_SITE_URL="$root_site_url" \
          pnpm --filter "@homepage/${ROOT_APP}" run build

          cp -R "apps/${ROOT_APP}/dist/." dist/

          for app in $DEPLOY_APPS; do
            base_path="${PAGES_ROOT}/${app}/"
            site_url="${SITE_ORIGIN}${base_path}"

            echo "Building ${app} -> ${base_path}"
            PUBLIC_BASE_PATH="$base_path" \
            PUBLIC_SITE_URL="$site_url" \
            pnpm --filter "@homepage/${app}" run build

            mkdir -p "dist/${app}"
            cp -R "apps/${app}/dist/." "dist/${app}/"
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
